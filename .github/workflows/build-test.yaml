name: Build & Test
run-name: Build & Test
permissions:
    contents: read
    checks: write
    pull-requests: write
on:
    push:
    schedule:
        - cron: "0 4 * * SUN"
jobs:
    build-test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            CONFIGURATION: Release
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Get Version from Git Tag
              id: get_version
              run: |
                  TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
                  VERSION=${TAG#v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Building version: $VERSION"

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore

            - name: Build
              id: build
              run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} /p:Version=${{ steps.get_version.outputs.version }}

            - name: Test Palindrome.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Palindrome.Tests/Palindrome.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Palindrome.Tests.trx

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              if: (!cancelled())
              with:
                  files: '**/*.trx'
                  action_fail_on_inconclusive: true
