name: Release
run-name: Release ${{ github.ref_name }}
permissions:
    contents: write
    checks: write
on:
    release:
        types: [published]
jobs:
    build-test-publish:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            id-token: write
            contents: write
            checks: write
        env:
            CONFIGURATION: Release
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Get Version from Release Tag
              id: get_version
              run: |
                  VERSION=${GITHUB_REF_NAME#v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Building release version: $VERSION"

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore

            - name: Build
              id: build
              run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} /p:Version=${{ steps.get_version.outputs.version }}

            - name: Test Palindrome.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Palindrome.Tests/Palindrome.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Palindrome.Tests.trx

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              if: (!cancelled())
              with:
                  files: '**/*.trx'
                  action_fail_on_inconclusive: true

            - name: NuGet Login
              uses: NuGet/login@v1
              with:
                  user: ${{ secrets.NUGET_USER }}

            - name: NuGet Push to NuGet.org
              run: dotnet nuget push **.nupkg --source "https://api.nuget.org/v3/index.json" --skip-duplicate

            - name: NuGet Push to GitHub Packages
              run: dotnet nuget push **.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/lyndychivs/index.json" --skip-duplicate

            - name: Upload NuGet Package to Release
              uses: softprops/action-gh-release@v3
              with:
                  files: |
                      **/*.nupkg
                      **/*.snupkg
